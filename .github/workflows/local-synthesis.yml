name: Local synthesis

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: local-synthesis-main
  cancel-in-progress: false

jobs:
  trigger-local-synthesis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Request GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          TOKEN="$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vlsi-ci-backup" \
            | jq -r '.value')"

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to obtain OIDC token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Trigger synthesis on vlsi-ci-backup
        id: synthesis
        shell: bash
        run: |
          RESPONSE_FILE="gateway-response.json"

          curl -sS -X POST "${{ vars.VLSI_CI_GATEWAY_URL }}/jobs/synthesis" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.token }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "run_id": "${{ github.run_id }}",
              "run_attempt": "${{ github.run_attempt }}"
            }' | tee "$RESPONSE_FILE"

          STATUS="$(jq -r '.synthesis_result.status // "UNKNOWN"' "$RESPONSE_FILE")"
          WNS="$(jq -r '.synthesis_result.wns_ns // "n/a"' "$RESPONSE_FILE")"
          TNS="$(jq -r '.synthesis_result.tns_ns // "n/a"' "$RESPONSE_FILE")"
          AREA="$(jq -r '.synthesis_result.total_area // "n/a"' "$RESPONSE_FILE")"
          LOG_FILE="$(jq -r '.log_file // "n/a"' "$RESPONSE_FILE")"
          BUILD_DIR="$(jq -r '.build_dir // "n/a"' "$RESPONSE_FILE")"
          RETURNCODE="$(jq -r '.returncode' "$RESPONSE_FILE")"

          {
            echo "## Local synthesis result"
            echo
            echo "| Metric | Value |"
            echo "|---|---:|"
            echo "| Status | $STATUS |"
            echo "| Return code | $RETURNCODE |"
            echo "| WNS ns | $WNS |"
            echo "| TNS ns | $TNS |"
            echo "| Total area | $AREA |"
            echo "| Remote build dir | \`$BUILD_DIR\` |"
            echo "| Remote log file | \`$LOG_FILE\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$RETURNCODE" != "0" ]; then
            echo "Remote synthesis failed with returncode=$RETURNCODE"
            exit 1
          fi

          if [ "$STATUS" != "PASS" ]; then
            echo "Remote synthesis completed but status is $STATUS"
            exit 1
          fi

      - name: Show synthesis summary
        shell: bash
        run: |
          echo "Remote synthesis completed successfully"
